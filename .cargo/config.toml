# [ENGINE] platform — cargo configuration

[build]
# Compile cache — important on a 4-core workstation.
rustc-wrapper = "sccache"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    # Fast linker.
    "-C", "link-arg=-fuse-ld=mold",
    # Owned crash unwinder requires frame pointers in every profile (ADR-011).
    "-C", "force-frame-pointers=yes",
]

[registries.crates-io]
protocol = "sparse"
