# [ENGINE] platform — manifest
# See ENGINE_SPECIFICATION_v2.0.md Part IV.1

[platform]
spec_version = "2.0"
# Phase 2 (LINUX SYSTEMS, spec Part XXI) closed: owned Robin Hood hash map
# (ADR-028), mmap'd pak loader (ADR-029), sampling profiler (ADR-030).
# `phase` stays at "2" until Phase 3 starts; bump when the next portfolio
# lands. Upper layers (render, physics, audio, net, script, ai, editor, …)
# remain stubs for Phase 3+.
phase = "2"

[determinism]
# Determinism Contract — spec IV.2 / ADR-013.
math_profile = "strict-ieee-754"
fma_on_sim_path = false

[telemetry]
# Editor telemetry is opt-in (ADR-020); no metrics leave the device
# until consent is recorded.
consent = "opt-in"
metrics_port = 9091
