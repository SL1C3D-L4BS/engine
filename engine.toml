# [ENGINE] platform — manifest
# See ENGINE_SPECIFICATION_v2.0.md Part IV.1

[platform]
spec_version = "2.0"
# Phase 1 (SILICON → C, spec Part XXI) closed: SIMD math, four arenas with
# unified accounting, cache observatory CLI + baseline. Upper layers (render,
# physics, audio, net, script, ai, editor, …) remain stubs for Phase 2+.
phase = "2"

[determinism]
# Determinism Contract — spec IV.2 / ADR-013.
math_profile = "strict-ieee-754"
fma_on_sim_path = false

[telemetry]
# Editor telemetry is opt-in (ADR-020); no metrics leave the device
# until consent is recorded.
consent = "opt-in"
metrics_port = 9091
