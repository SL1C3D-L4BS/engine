# [ENGINE] platform — manifest
# See ENGINE_SPECIFICATION_v2.0.md Part IV.1

[platform]
spec_version = "2.0"
# Phase 3 (ENGINE CORE) closed 2026-05-20: archetype-SoA storage with
# cross-arch `TypeStableId` (ADR-031), owned fiber job system + work-stealing
# thread pool (ADR-032), and the deterministic parallel scheduler with the
# replay-parity oracle and 1 M-entity bench (ADR-033). Engine Core v0.1
# tagged.
#
# Phase 4 (SCRIPTING) closed 2026-05-20: sli compiler front-end (ADR-034),
# register VM + tri-color GC + bytecode verifier (ADR-035), hot-reload +
# debugger protocol + REPL (ADR-036), Slang shader toolchain via sandboxed
# slangc subprocess (ADR-037), Slang reproducibility golden (ADR-038). Four
# PRs, all gated by cross-arch determinism oracles and the existing CI
# guards. `engine-script` + `tools/engine-shader` + `bin/engine-{repl,debug}`
# are production-ready.
#
# Phase 5 audit closed 2026-05-24: see
# `docs/audit/phases-0-4-enterprise-audit.md`. The audit's 14 remediation
# ADRs (ADR-039 through ADR-053) landed before Phase 5 implementation
# begins; the imminent renderer crate (`engine-render`), the testbed
# (`testbed/engine-raster`), and the new `engine-gpu` Level-1 wgpu
# wrapper (ADR-049) are scoped per ADR-053's 6-PR slicing plan. Upper
# layers (physics, audio, net, ai, editor, hub, ui, api, plugin-api)
# remain stubs for their respective phases.
#
# Phase 5 (RENDERING FOUNDATION, Track A) closed 2026-05-27. Six PRs:
# (1) software rasterizer + render-graph trait surface + pixel-parity
# oracle (ADR-039 + ADR-046); (2) owned `engine-gpu` wgpu wrapper +
# bindless heap + BC{4,5,7} import (ADR-049 + ADR-044 + ADR-045);
# (3) deferred G-buffer + cluster lights + CSM (ADR-040 + ADR-043);
# (4) IBL L2 SH probes + post-FX chain (SSAO, bloom, tonemap, TAA per
# ADR-041 + ADR-042); (5) UpscalerProvider trait surface with vendor
# stubs (DLSS/FSR/XeSS pending Phase 6) + OwnedBilinear placeholder +
# the RX-580 milestone bench (ADR-005); (6) frame-pacing CI gate
# scaffolded as informational (ADR-016 + ADR-047 — promoted to
# required when the self-hosted RX 6700 XT runner is provisioned per
# `docs/runbooks/frame-pacing-runner.md`). PR-6 also closed two
# audit follow-ups: the full ADR-060 sli aggregate-ops codegen
# surface (ArrayLit / MapLit syntax + Field / Index / StructLit /
# Closure codegen wiring) and the missing ADR-048 pak overlay tests.
# Engine Core v0.2 is the Phase-5 milestone tag.
#
# Phase 6 (RENDERING FOUNDATION, Track A, Part 2) — contract-side
# closed 2026-05-27. Six commits implement the contracts the
# runner-gated GPU implementation will bind against:
# (0) pre-Phase-6 design sweep ADRs 061-068; (1) mesh + material owned
# binary formats (EMSH + EMAT) + glTF importer subprocess
# (ADR-061 + ADR-062); (2) shader-artefact → pipeline binding
# (ADR-063); (3) GPU pass contracts (ADR-064 + ADR-065) — descriptor
# layouts, MRT formats, SSBO record shapes, cluster + CSM constants
# cross-checked against the CPU oracle in
# `testbed/engine-raster/tests/rendering_contracts.rs`;
# (5) OwnedOnnxTemporal cascade reservation + with_phase6_defaults()
# (ADR-066 + ADR-067).
#
# Reconciled 2026-05-27 (ADR-069): the engine's "Phase 6" naming
# absorbed work that the spec considered Phase 5 closure (GPU
# binding + shader sources + bind-group authoring), while spec
# Phase 6 (3DGS + neural rendering) was untouched. The in-progress
# work is renamed to **Phase 5.5 — Track A GPU binding closure**.
# Spec Phase 6 opens with a fresh track after Engine Core v0.3 ships.
#
# Phase 5.5 progress (2026-05-27):
# - ADR-069 (engine vs spec phase reconciliation) — landed.
# - ADR-074 (wgpu Vulkan backend for Polaris GFX8 / RADV) — landed;
#   `wgpu/vulkan` feature enabled, push-constant limit fix, the
#   workspace can reach the user's RX 580 through Mesa RADV.
# - ADR-075 (Track-A pass `record()` implementation discipline) —
#   landed; the auto-derive bootstrap (A.2a) means all 12 pipelines
#   construct cleanly via WGSL reflection; explicit bindgroups/
#   layouts can replace auto-derive pass-by-pass as A.2c cleanup.
# - A.2b-i (engine-gpu BindGroup + MRT/depth pass surface) — landed
#   with the GPU compute round-trip test as proof.
#
# Phase 5.5 remaining work for Engine Core v0.3:
# - A.2b-ii (per-pass record() body wiring) — bind-group construction
#   + transient resource pool + real dispatches.
# - A.3 (six pixel-parity oracle fixtures) — cross-validate the GPU
#   path against the CPU oracle per ADR-046.
# - A.4 (OwnedOnnxTemporal real impl + starter ESPCN model) — per
#   ADR-067, with the CPU backend (ROCm dropped GFX8).
# - A.5 (FSR 2 spatial fallback) — the Polaris-compatible vendor
#   provider per ADR-076 (to be filed).
# - A.6 (engine-config crate refactor) — PR 7.5 cleanup #15.
# - C.1 + C.2 (frame-pacing re-baseline + CI gate redesign per
#   ADR-070, to be filed).
# - v0.3 tag.
phase = "5.5"

[determinism]
# Determinism Contract — spec IV.2 / ADR-013.
math_profile = "strict-ieee-754"
fma_on_sim_path = false

[telemetry]
# Editor telemetry is opt-in (ADR-020); no metrics leave the device
# until consent is recorded.
consent = "opt-in"
metrics_port = 9091

# Upscaler selection override (Phase 6 PR 5.5 schema; runtime reader
# lands with the SDK integration follow-up per ADR-005 §Consequences
# + ADR-066 §6).
#
# `provider`:
#   "auto"           — walk the cascade (DLSS → FSR → XeSS →
#                      OwnedOnnxTemporal → OwnedBilinear) and pick the
#                      first whose supports() returns true. This is the
#                      Phase-6 default and the recommended setting.
#   "dlss"           — force the DLSS provider; falls through to
#                      OwnedBilinear if the active build doesn't have
#                      `--features dlss` or the host lacks the
#                      Streamline runtime.
#   "fsr"            — force AMD FSR 4.
#   "xess"           — force Intel XeSS 2.
#   "owned-onnx"     — force the owned ONNX temporal upscaler.
#   "owned-bilinear" — force the bilinear placeholder (fastest, lowest
#                      quality; the spec-baseline RX-580 milestone uses
#                      this when no other provider is available).
#
# `quality`:
#   "performance"    — render at 50% scale, upscale to display.
#   "balanced"       — render at 67% scale.
#   "quality"        — render at 75% scale.
#   "ultra-quality"  — render at 100% scale (no internal scaling).
#
# Both fields are optional; their omission inherits the cascade
# defaults. The bench JSON report (ADR-066 §Consequences) records the
# selected provider + reason on every run.
#
# [upscaler]
# provider = "auto"
# quality  = "balanced"
