# [ENGINE] platform — manifest
# See ENGINE_SPECIFICATION_v2.0.md Part IV.1

[platform]
spec_version = "2.0"
# Phase 3 (ENGINE CORE, spec Part XXI) in progress. PR 1 (ADR-031) lands
# archetype-SoA storage and the `TypeStableId` cross-arch identifier; PR 2
# (ADR-032) adds the owned fiber job system in engine-platform; PR 3
# (ADR-033) closes the phase with the deterministic parallel scheduler, the
# 1 M-entity benchmark, and the replay-parity oracle. Upper layers (render,
# physics, audio, net, script, ai, editor, …) remain stubs for Phase 4+.
phase = "3"

[determinism]
# Determinism Contract — spec IV.2 / ADR-013.
math_profile = "strict-ieee-754"
fma_on_sim_path = false

[telemetry]
# Editor telemetry is opt-in (ADR-020); no metrics leave the device
# until consent is recorded.
consent = "opt-in"
metrics_port = 9091
