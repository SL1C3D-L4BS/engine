# [ENGINE] platform — CI gate.
#
# This workflow is written to the GitHub Actions schema, which Forgejo Actions
# also consumes — so it runs unchanged whether the repository's remote ends up
# on GitHub or on the self-hosted Forgejo named in spec XVIII.14.
#
# Two jobs:
#   gate         — build, test, lint, fmt, deny on x86-64.
#   determinism  — runs the determinism oracles on x86-64 *and* aarch64, each
#                  against the same committed golden files. Two architectures
#                  agreeing with one golden proves cross-arch byte-equality
#                  transitively (Determinism Contract, spec IV.2 / ADR-013).

name: ci

on:
  push:
  pull_request:

# CI runners have no sccache; the wrapper from .cargo/config.toml must be
# disabled or every cargo invocation fails trying to exec it.
env:
  RUSTC_WRAPPER: ""
  CARGO_TERM_COLOR: always

jobs:
  gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build tooling
        run: sudo apt-get update && sudo apt-get install -y mold clang

      # rust-toolchain.toml pins the channel and components; rustup honours it.
      - name: Show toolchain
        run: rustc --version && cargo --version

      # ubuntu-24.04 ships neither `just` nor the cargo extras the workflow
      # invokes; install via cargo so the toolchain pin from
      # `rust-toolchain.toml` governs the build.
      - name: Install just
        run: cargo install just --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked

      - name: Guard against std::collections::HashMap in owned crates (ADR-028)
        run: |
          # Phase 2 own-the-substrate: engine-core and engine-asset library
          # source must use engine_core::collections::HashMap, not std's
          # SwissTable. Tests and benches stay free to compare against std.
          # The second grep strips line-comment / doc-comment lines so
          # rustdoc cross-references like `[std::collections::HashMap]`
          # don't trip the guard.
          hits=$(grep -rnE 'std::collections::HashMap|use std::collections::HashMap' \
              crates/engine-core/src \
              crates/engine-asset/src \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Use engine_core::collections::HashMap instead of std's — see ADR-028"
            exit 1
          fi

      - name: Guard against unowned threading primitives (ADR-032)
        run: |
          # Owned thread pool / job graph (ADR-032) is the single
          # producer of std::thread::spawn and std::sync::{Mutex,RwLock,
          # mpsc} in the engine. The allowlist is exactly:
          #   - crates/engine-platform/src/thread_pool.rs (the pool)
          #   - crates/engine-platform/src/sampler.rs (perf-event-fd
          #     ring buffer, ADR-030 — uses a Mutex on the ring head)
          # Tests, benches, and proc-macro crates are exempt — those
          # don't ship to user runtimes.
          hits=$(grep -rnE 'std::thread::spawn|std::sync::Mutex|std::sync::RwLock|std::sync::mpsc' crates \
              | grep -v -e 'crates/engine-platform/src/thread_pool.rs' \
                       -e 'crates/engine-platform/src/sampler.rs' \
                       -e 'crates/engine-core/src/ecs/schedule.rs' \
                       -e '/tests/' -e '/benches/' \
                       -e 'crates/engine-ecs-macro/' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Route through engine_platform::ThreadPool — see ADR-032"
            exit 1
          fi
          # The "external thread-pool crates" guard: reject vendored
          # alternatives anywhere in `crates/`. ADR-025 + ADR-032 both
          # require the owned substrate.
          bad=$(grep -rnE '\brayon\b|\bcrossbeam\b|\btokio\b|\bparking_lot\b|\basync-std\b|\basync_std\b' crates \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' \
              | grep -vE '\.md:' || true)
          if [ -n "$bad" ]; then
            echo "$bad"
            echo "::error::No rayon/crossbeam/tokio/parking_lot/async-std — see ADR-025 / ADR-032"
            exit 1
          fi
          # `core::arch::naked_asm!` must be confined to the per-arch
          # fiber modules.
          asm=$(grep -rnE 'naked_asm!' crates \
              | grep -v -e 'crates/engine-platform/src/fiber/x86_64.rs' \
                       -e 'crates/engine-platform/src/fiber/aarch64.rs' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)
          if [ -n "$asm" ]; then
            echo "$asm"
            echo "::error::naked_asm! only inside fiber/{x86_64,aarch64}.rs — see ADR-032"
            exit 1
          fi

      - name: Guard against TypeId::of in the ECS source (ADR-031)
        run: |
          # The Phase 3 archetype index keys signatures by `TypeStableId`,
          # never by `std::any::TypeId` (process-private, not cross-arch
          # stable). The resource map is the single grandfathered TypeId
          # consumer; its lines are tagged with an inline
          # `// allow: resources` comment that this grep recognises.
          # Doc/line-comments (// rustdoc cross-references, // explanatory
          # text) are stripped before the check too — those don't generate
          # code.
          hits=$(grep -rnE 'TypeId::of::<' crates/engine-core/src/ecs \
              | grep -v 'allow: resources' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Use TypeStableId / Component::STABLE_ID instead of TypeId::of — see ADR-031"
            exit 1
          fi

      - name: Guard against raw mmap outside engine-platform (ADR-029)
        run: |
          # The mmap syscall is allowed in two files only:
          #   - crates/engine-platform/src/mmap.rs (regular files; ADR-029)
          #   - crates/engine-platform/src/sampler.rs (perf-event-fd ring
          #     buffer; ADR-030)
          # Anywhere else — including engine-asset — must route through
          # MmapRo so the munmap-on-drop and length-bounds invariants stay
          # in one place. The sampler intentionally does *not* go through
          # MmapRo because the perf-event fd is not a regular file and
          # needs PROT_WRITE on the header page. The third grep strips
          # line-/doc-comment lines so docstring references to
          # `libc::mmap` don't trip the guard.
          hits=$(grep -rnE 'libc::mmap|libc::munmap|libc::madvise' crates \
              | grep -v -e 'crates/engine-platform/src/mmap.rs' \
                       -e 'crates/engine-platform/src/sampler.rs' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Use engine_platform::mmap::MmapRo — see ADR-029"
            exit 1
          fi

      - name: Guard against TRAP opcode (0xFF) outside reserved files (ADR-035)
        run: |
          # The TRAP opcode is the debugger's breakpoint patch — only the
          # bytecode definition, the verifier, and PR-3's debugger may
          # mention the literal `0xFF`. Defence-in-depth backstop for the
          # ADR-035 four-layer impossibility argument; the type system
          # already pins the architectural invariant, and the runtime
          # fuzz oracle (`tests/codegen_no_trap.rs`) is the last
          # belt-and-braces check. This grep adds a static one: a stray
          # `0xFF` literal in a fresh codegen file would be a red flag.
          hits=$(grep -rnE '0xFF\b' crates/engine-script/src \
              | grep -v -e 'crates/engine-script/src/bytecode.rs' \
                       -e 'crates/engine-script/src/verify.rs' \
                       -e 'crates/engine-script/src/debug.rs' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*!' \
              | grep -vE '\.md:' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Literal 0xFF reserved for the TRAP opcode (ADR-035) — bytecode.rs / verify.rs / debug.rs only"
            exit 1
          fi

      # ADR-034 owned-VM enforcement migrated to `deny.toml [bans] deny`
      # 2026-05-28. The previous grep-on-source guard regex
      # `\brlua\b|\bmlua\b|\bwasmtime\b|\bwasmer\b|\bcranelift\b|\binkwell\b|\blalrpop\b|\bpest\b|\bnom\b|\bcombine\b|\bchumsky\b`
      # false-positived on common English / programming words used as
      # local-variable names (the trigger was `let combine = ...` in
      # `crates/engine-script/tests/aggregate_ops_codegen.rs`). The
      # correct mechanism is cargo-deny's dependency-graph ban list —
      # it matches actual Cargo manifest entries by exact crate name,
      # not arbitrary substrings in source code. The `CI gate` step
      # below runs `just ci`, which invokes `cargo deny check`. See
      # `deny.toml` for the named-crate rejection list.
      #
      # ADR-036 + ADR-037 vendored-crate guards likewise migrated to
      # `deny.toml`: bincode / prost / protobuf / rmp (debugger wire
      # protocol), shaderc / shaderc-rs / spirv-tools / spirv-cross /
      # glslang (Slang front-end). `serde` and `naga` are NOT banned
      # because the wgpu transitive dep graph requires them.

      - name: Guard against vendored line editors in REPL (ADR-036)
        run: |
          # Phase 4 PR 3's REPL is cooked-mode stdin only. The
          # raw-mode termios + line-editor layer is the Phase-10
          # editor's job. Until then the REPL stays portable and
          # CI-friendly; no rustyline / reedline / linefeed link.
          hits=$(grep -rnE '\brustyline\b|\breedline\b|\blinefeed\b' bin/engine-repl \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*!' \
              | grep -vE '\.md:' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Cooked-mode REPL only — see ADR-036 (no rustyline/reedline/linefeed in bin/engine-repl)"
            exit 1
          fi

      - name: Guard against internal engine_* imports from bin / templates / starter-kits (ADR-050)
        run: |
          # Phase 0 catchup: bin/ and templates/ and starter-kits/ may only
          # import the engine-api facade crate. Internal crates (engine_core,
          # engine_script, engine_asset, …) must not be imported directly
          # from these locations. This guard is the interim mechanism
          # until engine-api activates (ADR-050) and cargo-semver-checks
          # owns the contract surface end-to-end. While engine-api is
          # empty (pre-Phase-10), the guard still rejects internal-crate
          # imports from bin/ etc. — bins use whichever internal crates
          # they currently consume directly (e.g. bin/engine-repl uses
          # engine_script), and that allowlist is documented inline here.
          # Phase 10's engine-api activation tightens this to "only
          # engine_api may be imported from bin/."
          #
          # Current allowlist of internal crates that bin/ + templates/
          # may import (the pre-Phase-10 reality):
          #   - engine_script   (bin/engine-repl, bin/engine-debug)
          #   - engine_asset, engine_core, engine_telemetry, engine_platform
          #                     (Phase-0–4 CLIs and benches)
          #   - engine_math     (frame-pacing bench scene generation)
          #   - engine_render + engine_gpu (engine-bench-frame-pacing only,
          #                     for upscaler + render-graph fixture access;
          #                     engineering-only bench per ADR-005 + ADR-049,
          #                     not user-facing — relocated allowlist 2026-05-28)
          # Future state (post-Phase-10): only engine_api.
          #
          # The regex blocklists the strictly-internal stub crates that
          # have no consumer in bin/ today; `render` + `gpu` were dropped
          # 2026-05-28 because bin/engine-bench-frame-pacing legitimately
          # consumes them.
          if [ -d bin ] || [ -d templates ] || [ -d starter-kits ]; then
            hits=$(grep -rnE 'use engine_(reflect|i18n|audio|ai|net|physics|ui|editor|hub_core|plugin_api)\b' \
                bin templates starter-kits 2>/dev/null \
                | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' \
                | grep -vE '^[^:]+:[0-9]+:[[:space:]]*!' \
                | grep -vE '\.md:' || true)
            if [ -n "$hits" ]; then
              echo "$hits"
              echo "::error::bin/ + templates/ + starter-kits/ must import via engine-api — see ADR-050"
              exit 1
            fi
          fi

      - name: cargo-geiger unsafe enumeration (ADR-058)
        run: |
          # Enumerate unsafe code in the workspace and compare against the
          # committed baseline. New unsafe in a previously-safe crate is a
          # CI failure (review must add a baseline section); new unsafe in
          # an existing-unsafe crate is allowed but the baseline must be
          # updated in the same PR. See ADR-058.
          # cargo-geiger ships as a separate crate; install on demand.
          # The check tool is the workspace's engine-geiger-check binary
          # (~150 LOC) which parses the JSON report and the markdown
          # baseline; lives at tools/engine-geiger-check/.
          if [ -d tools/engine-geiger-check ]; then
            cargo install cargo-geiger --locked || true
            if command -v cargo-geiger >/dev/null 2>&1; then
              cargo geiger --workspace --output-format Json > /tmp/geiger.json 2>/dev/null || true
              cargo run --quiet -p engine-geiger-check -- \
                --baseline docs/observatory/cargo-geiger-baseline.md \
                --report /tmp/geiger.json || {
                  echo "::error::cargo-geiger baseline drift — see ADR-058 / docs/observatory/cargo-geiger-baseline.md"
                  exit 1
                }
            else
              echo "::warning::cargo-geiger not installable on this runner; skipping (informational, see ADR-058)"
            fi
          else
            echo "::warning::tools/engine-geiger-check not present yet; cargo-geiger check is a no-op (ADR-058 Phase-0 catchup)"
          fi

      - name: Guard against direct wgpu use outside engine-gpu (ADR-049)
        run: |
          # Phase 5 introduces wgpu as a workspace dep. The owned
          # `engine-gpu` Level-1 crate is the single permissible
          # consumer; every higher crate names engine_gpu types, not
          # wgpu types. Doc-comments and rustdoc cross-references stay
          # exempt (same strip pattern as ADR-028/-029/-032 guards).
          # The crates/engine-gpu/ allowlist activates the first time
          # that directory exists; until then the guard is a no-op.
          hits=$(grep -rnE '\bwgpu::|use wgpu\b|extern crate wgpu' crates bin tools testbed \
              | grep -v -e 'crates/engine-gpu/' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*!' \
              | grep -vE '\.md:' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Route through engine_gpu instead of wgpu directly — see ADR-049"
            exit 1
          fi

      - name: Guard against direct gltf use outside engine-mesh-import (ADR-062)
        run: |
          # Phase 6 PR 1 introduces gltf as a workspace dep. The
          # `tools/engine-mesh-import/` subprocess CLI is the single
          # permissible consumer; the runtime crates consume
          # engine_asset::{MeshMeta, MaterialMeta} (EMSH / EMAT) blobs
          # produced by the importer, never raw gltf types. Same shape
          # as ADR-049's wgpu boundary guard. The allowlist activates
          # the first time the importer directory exists; until then
          # the guard is a no-op.
          hits=$(grep -rnE '\bgltf::|use gltf\b|extern crate gltf' crates bin tools testbed \
              | grep -v -e 'tools/engine-mesh-import/' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' \
              | grep -vE '^[^:]+:[0-9]+:[[:space:]]*!' \
              | grep -vE '\.md:' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Route mesh import through tools/engine-mesh-import — see ADR-062"
            exit 1
          fi

      - name: CI gate (build, test, lint, fmt, deny)
        run: just ci

      # ADR-050: cargo-semver-checks is wired in now (no-op while
      # engine-api is empty) so the API-stability gate is proven in
      # place before the contract activates at v1.0 (spec risk R-03,
      # spec §XX.1). The check exits 0 trivially on a crate with no
      # public items; a future PR that lands the first engine-api
      # symbol inherits the working gate without further wiring.
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: API stability check — engine-api (ADR-012 + ADR-050)
        run: |
          # The "no baseline" first run cannot diff against a prior
          # release. Once the first tagged release exists this becomes
          # the live check; until then the wiring is exercised but
          # tolerant.
          set +e
          cargo semver-checks check-release -p engine-api
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            # On a stub crate the only non-zero exit is "no baseline
            # found", which is expected pre-v1.0. Treat anything else
            # as a hard failure.
            echo "::warning::cargo-semver-checks exited $rc on a stub engine-api crate — pre-v1.0 expected behaviour. See ADR-050."
          fi

      # Sampling profiler oracle (ADR-030). Requires frame-pointer codegen
      # so the kernel's PERF_SAMPLE_CALLCHAIN walker finds frames past the
      # leaf; --release is required because the oracle's "spinner is ≥80%
      # of self-time" threshold only holds in an optimized build.
      - name: Sampling profiler oracle (Linux)
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
        run: |
          # Frame-pointer guard: the test below would silently degrade
          # without this flag — every chain would truncate at the leaf,
          # which is *not* a regression we can let pass.
          case "$RUSTFLAGS" in
            *force-frame-pointers=yes*)
              echo "frame-pointer codegen on: ok"
              ;;
            *)
              echo "::error::profiler_oracle requires -C force-frame-pointers=yes in RUSTFLAGS (ADR-030)"
              exit 1
              ;;
          esac
          cargo test --release -p engine-telemetry --test profiler_oracle

  determinism:
    strategy:
      fail-fast: false
      matrix:
        # Native runners for both architectures. If an aarch64 runner is
        # unavailable, swap to a QEMU-emulated x86-64 runner with
        # `docker run --platform linux/arm64` — slower, but equivalent.
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    # The simulation path is built with FMA disabled (the `profile.sim` codegen
    # flag) so transcendental and arithmetic results are bit-identical.
    env:
      RUSTFLAGS: "-C target-feature=-fma"
    steps:
      - uses: actions/checkout@v5

      - name: Install build tooling
        run: sudo apt-get update && sudo apt-get install -y mold clang

      - name: Guard against fused multiply-add in engine-math (ADR-023, ADR-027)
        run: |
          # Reject both the high-level `mul_add` and the SIMD-FMA intrinsics
          # the Phase 1 SIMD wrapper could in principle reach for. Covers SSE
          # `_mm_fma*` / `_mm_fms*` and NEON `vfma*` / `vfms*` / `vmla*` /
          # `vmls*` — the older multiply-accumulate is contract-prone too.
          if grep -rnE '\.mul_add\(|_mm_fma|_mm_fms|vfma|vfms|vmla|vmls' crates/engine-math/src; then
            echo "::error::engine-math must not call FMA — see ADR-023 / ADR-027"
            exit 1
          fi

      - name: Run the engine-math SIMD parity oracle
        run: cargo test -p engine-math --test simd_parity

      - name: engine-math determinism oracle
        run: cargo test -p engine-math --test determinism

      - name: engine-core determinism oracle
        run: cargo test -p engine-core --test determinism

      - name: engine-core replay parity oracle (ADR-033)
        # Cross-worker-count parity: parallel `Schedule::run_on` at
        # workers {1, 2, 4, N} must produce digests identical to the
        # single-threaded reference at frames 1, 10, 100. Runs on both
        # x86-64 and aarch64 — same property the Determinism Contract
        # demands of the math and golden tests above.
        run: cargo test -p engine-core --test replay_parity

      - name: engine-script compile parity oracle (ADR-034)
        # Phase 4 PR 1: compile every fixture in the sli corpus, take a
        # BLAKE3 digest over the optimised-IR serialisation, and
        # compare against the committed golden. Two arches agreeing
        # with one golden proves cross-arch byte-equal bytecode
        # emission transitively (same pattern as engine-math /
        # engine-core).
        run: cargo test -p engine-script --test compile_parity

      - name: engine-script VM oracle (ADR-035)
        # Phase 4 PR 2: execute the eleven curated programs end-to-end
        # in the register VM, take a BLAKE3 digest over (name, result)
        # pairs, and compare against the committed golden. Same
        # cross-arch contract as the compile-parity oracle.
        run: cargo test -p engine-script --test vm_oracle

      - name: engine-script codegen-no-trap fuzz oracle (ADR-035)
        # 500 deterministic synthetic programs + the corpus; asserts no
        # compiled function emits a TRAP opcode byte (0xFF). Runtime
        # backstop for the four-layer TRAP-collision impossibility
        # argument (ADR-035).
        run: cargo test -p engine-script --test codegen_no_trap

      - name: engine-script debugger protocol round-trip oracle (ADR-036)
        # PR 3: encode every request, response, and event variant on
        # the owned binary wire protocol, decode through `decode_frame`,
        # and assert equality. Catches version-byte, tag-byte, and
        # operand-encoding drift. Cross-arch parity rides on every
        # operand being little-endian by construction.
        run: cargo test -p engine-script --test debug_protocol

      - name: engine-script hot-reload + breakpoint persistence oracles (ADR-036)
        # PR 3: hot-reload runs the polling watcher backend
        # deterministically. Breakpoint persistence pins the owned
        # TOML writer/reader. Watch-expression safety pins the
        # strict-deny purity verifier.
        run: |
          cargo test -p engine-script --test hot_reload
          cargo test -p engine-script --test breakpoint_persistence
          cargo test -p engine-script --test watch_expr_safety

      - name: engine-debug editor-bridge protocol contract (ADR-036)
        # PR 3: runs the `editor-bridge` example as a subprocess; the
        # example exercises every protocol request / response / event
        # variant against an in-process VM fixture. A clean exit is
        # the proof that the Phase-10 editor's wire surface is intact.
        run: cargo test -p engine-debug

      - name: engine-shader codec + target enum oracles (ADR-037)
        # PR 4: pin the on-disk artefact bundle codec, target / stage
        # tag stability, and the BLAKE3 digest invariants. These tests
        # are pure-Rust and require no slangc binary — they run on
        # every runner unconditionally.
        run: |
          cargo test -p engine-shader --test target_enum
          cargo test -p engine-shader --test bundle_codec

      - name: engine-shader reproducibility oracle (ADR-038)
        # PR 4: compile the fixture against every available target,
        # take a BLAKE3 digest per (entry, stage, target) pair, and
        # compare against the committed golden. Skips targets whose
        # downstream backend (e.g. DXIL's `dxcompiler`) is missing;
        # the rest of the matrix still enforces. The slangc binary
        # itself is *not* installed by this workflow — runners
        # without slangc see a graceful skip with a printed warning.
        run: cargo test -p engine-shader --test reproducibility

  # Frame-pacing gate removed per ADR-070 (Phase 5.5 C.2 — 2026-05-27).
  #
  # ADR-047's original `frame_pacing` job referenced a
  # `self-hosted-gpu` runner that was never provisioned. The
  # developer's actual hardware is the spec's named Recommended-tier
  # hardware (RX 580 / Polaris GFX8, spec Part XX.7 line 1587) — the
  # spec milestone hardware. Per ADR-070, frame-pacing measurement
  # moves to a local `just frame-pacing` recipe; the bench binary is
  # unchanged. CI continues to enforce build / test / clippy / fmt /
  # deny on every push (the `gate` + `determinism` jobs above).
  #
  # Restoration: if/when a second contributor joins, re-add the
  # workflow stanza (the git history at ADR-070's commit preserves
  # the prior wording) and provision a self-hosted runner labelled
  # appropriately for the active hardware envelope.
